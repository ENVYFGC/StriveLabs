name: Validate Combo Data

on:
  pull_request:
    paths:
      - 'combo_data/**'
      - 'tools/validate_combos.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate combo data
        run: python tools/validate_combos.py
